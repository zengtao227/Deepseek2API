services:
  Deepseek2API:
    image: ghcr.io/cjackhwang/Deepseek2API:latest
    container_name: Deepseek2API
    restart: always
    env_file:
      - .env
    ports:
      # Host port is configurable via Deepseek2API_HOST_PORT; container port stays fixed at 5001.
      - "${Deepseek2API_HOST_PORT:-6011}:5001"
    volumes:
      - ./config.json:/data/config.json   # 配置文件（持久化推荐路径）
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - Deepseek2API_ADMIN_KEY=${Deepseek2API_ADMIN_KEY:-Deepseek2API}
      - Deepseek2API_CONFIG_PATH=/data/config.json
